<!DOCTYPE html>
<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Harven Mines Predic</title>

    <link rel="stylesheet" href="style.css">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

</head>

<body>

<div class="background"></div>

<header>

    <div class="logo">

        <i class="fa-solid fa-star"></i>

        <h1>Harven Mines Predic</h1>

    </div>

</header>

<div class="container">

<div class="panel">

<div class="stats">

<div class="card">

<h3>Tours</h3>

<span id="round">0</span>

</div>

<div class="card">

<h3>Étoiles</h3>

<span>4</span>

</div>

</div>

<button id="generate">

<i class="fa-solid fa-wand-magic-sparkles"></i>

Générer

</button>

</div>

<div class="board" id="board">

</div>

<div class="history">

<h2>Historique</h2>

<ul id="history"></ul>

</div>

</div>

<div id="loader">

<div class="spinner"></div>

<p>Analyse...</p>

</div>

<script src="script.js"></script>

</body>
</html>
